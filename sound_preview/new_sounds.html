<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOKMA — Yeni Karakteristik Sesler 🔔</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            min-height: 100vh;
        }
        .bg-glow {
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(251,51,91,0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FB335B, #FF6B8A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header p { color: #888; font-size: 14px; margin-bottom: 32px; }

        .sound-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .sound-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(251,51,91,0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(251,51,91,0.1);
        }
        .sound-card.playing {
            border-color: #FB335B;
            background: rgba(251,51,91,0.08);
            animation: pulse 0.5s ease;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .icon { font-size: 36px; min-width: 50px; text-align: center; }
        .info { flex: 1; }
        .info .name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .info .desc { font-size: 13px; color: #888; }
        .info .tag {
            display: inline-block;
            margin-top: 6px;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
        .tag-signature { background: rgba(251,51,91,0.15); color: #FB335B; }
        .tag-premium { background: rgba(168,85,247,0.15); color: #a855f7; }
        .tag-fun { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .tag-bold { background: rgba(245,158,11,0.15); color: #f59e0b; }

        .play-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(251,51,91,0.15);
            border: none; color: #FB335B;
            font-size: 18px; cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .play-btn:hover { background: rgba(251,51,91,0.3); transform: scale(1.1); }

        .visualizer {
            height: 50px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 0 16px;
            overflow: hidden;
        }
        .visualizer .bar {
            width: 3px;
            background: linear-gradient(to top, #FB335B, #FF6B8A);
            border-radius: 2px;
            transition: height 0.1s ease;
            min-height: 3px;
        }
        .selected-box {
            display: none;
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
        }
        .selected-box strong { color: #22c55e; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="header">
            <h1>🆕 Yeni Karakteristik Sesler</h1>
            <p>LOKMA'ya özel, daha dikkat çekici ve akılda kalan bildirim sesleri</p>
        </div>

        <div class="visualizer" id="visualizer"></div>
        <div id="soundList"></div>
        <div class="selected-box" id="selectedBox"></div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Visualizer
        const vizEl = document.getElementById('visualizer');
        for (let i = 0; i < 40; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '3px';
            vizEl.appendChild(bar);
        }
        const bars = vizEl.querySelectorAll('.bar');
        function animateViz(dur = 1.5) {
            const start = Date.now();
            function frame() {
                const t = (Date.now() - start) / 1000;
                if (t > dur) { bars.forEach(b => b.style.height = '3px'); return; }
                const decay = Math.exp(-t * 3);
                bars.forEach((b, i) => {
                    const wave = Math.sin(t * 12 + i * 0.3) * 0.5 + 0.5;
                    b.style.height = (3 + wave * 44 * decay) + 'px';
                });
                requestAnimationFrame(frame);
            }
            frame();
        }

        function sine(freq, t) { return Math.sin(2 * Math.PI * freq * t); }
        function env(t, attack = 0.003, decay = 0.3) {
            if (t < attack) return t / attack;
            return Math.max(0, Math.exp(-(t - attack) / decay));
        }

        const sounds = [
            {
                id: 'lokma_signature_melody',
                name: '🎵 Signature Melody',
                desc: 'Yükselen C-E-G melodi — LOKMA\'nın kendi sesi',
                tag: 'LOKMA İMZA SESİ', tagClass: 'tag-signature',
                icon: '🎶',
                play() {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const now = audioCtx.currentTime;
                    const master = audioCtx.createGain();
                    master.connect(audioCtx.destination);
                    master.gain.setValueAtTime(0.5, now);
                    [[1047,0],[1319,0.15],[1568,0.30]].forEach(([freq,start]) => {
                        [1, 2, 3].forEach((h, i) => {
                            const osc = audioCtx.createOscillator();
                            const g = audioCtx.createGain();
                            osc.type = 'sine';
                            osc.frequency.value = freq * h;
                            const amp = [0.3, 0.09, 0.03][i];
                            g.gain.setValueAtTime(0, now + start);
                            g.gain.linearRampToValueAtTime(amp, now + start + 0.003);
                            g.gain.exponentialRampToValueAtTime(0.001, now + start + 0.4);
                            osc.connect(g); g.connect(master);
                            osc.start(now + start); osc.stop(now + start + 0.5);
                        });
                    });
                    animateViz(1.2);
                }
            },
            {
                id: 'lokma_turkish_strike',
                name: '🇹🇷 Turkish Strike',
                desc: 'Derin + parlak çift vuruş — Doğu esintili',
                tag: 'KARAKTERİSTİK', tagClass: 'tag-bold',
                icon: '🔱',
                play() {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const now = audioCtx.currentTime;
                    const master = audioCtx.createGain();
                    master.connect(audioCtx.destination);
                    master.gain.setValueAtTime(0.5, now);
                    // Deep hit
                    [[440,0.35],[880,0.18],[1320,0.09]].forEach(([f,a]) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.type='sine'; o.frequency.value=f;
                        g.gain.setValueAtTime(a, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now+0.5);
                        o.connect(g); g.connect(master); o.start(now); o.stop(now+0.6);
                    });
                    // Bright hit
                    setTimeout(() => {
                        [[1174.66,0.3],[2349,0.12]].forEach(([f,a]) => {
                            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                            o.type='sine'; o.frequency.value=f;
                            g.gain.setValueAtTime(a, audioCtx.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.3);
                            o.connect(g); g.connect(master); o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime+0.4);
                        });
                    }, 250);
                    animateViz(1.5);
                }
            },
            {
                id: 'lokma_pop_melody',
                name: '🎮 Pop Melody',
                desc: '4 nota yükselen melodi — Uber Eats tarzı',
                tag: 'EĞLENCELİ', tagClass: 'tag-fun',
                icon: '🚀',
                play() {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const now = audioCtx.currentTime;
                    const master = audioCtx.createGain();
                    master.connect(audioCtx.destination);
                    master.gain.setValueAtTime(0.5, now);
                    [[784,0],[988,0.12],[1175,0.24],[1568,0.36]].forEach(([freq,start]) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.type='sine'; o.frequency.value=freq;
                        g.gain.setValueAtTime(0, now+start);
                        g.gain.linearRampToValueAtTime(0.25, now+start+0.003);
                        g.gain.exponentialRampToValueAtTime(0.001, now+start+0.25);
                        o.connect(g); g.connect(master); o.start(now+start); o.stop(now+start+0.3);
                        // Harmonic
                        const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
                        o2.type='sine'; o2.frequency.value=freq*2;
                        g2.gain.setValueAtTime(0, now+start);
                        g2.gain.linearRampToValueAtTime(0.05, now+start+0.003);
                        g2.gain.exponentialRampToValueAtTime(0.001, now+start+0.2);
                        o2.connect(g2); g2.connect(master); o2.start(now+start); o2.stop(now+start+0.25);
                    });
                    animateViz(1.0);
                }
            },
            {
                id: 'lokma_delivery_alert',
                name: '📣 Delivery Alert',
                desc: 'Güçlü 2-tonlu dikkat çekici — kaçırılmaz',
                tag: 'GÜÇLÜ', tagClass: 'tag-bold',
                icon: '🚚',
                play() {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const now = audioCtx.currentTime;
                    const master = audioCtx.createGain();
                    master.connect(audioCtx.destination);
                    master.gain.setValueAtTime(0.5, now);
                    // Strong first
                    [[1047,0.4],[2094,0.2]].forEach(([f,a]) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.type='sine'; o.frequency.value=f;
                        g.gain.setValueAtTime(a, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now+0.15);
                        o.connect(g); g.connect(master); o.start(now); o.stop(now+0.2);
                    });
                    // Response tone
                    [[1568,0.35],[3136,0.14],[4704,0.035]].forEach(([f,a]) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.type='sine'; o.frequency.value=f;
                        g.gain.setValueAtTime(0, now+0.18);
                        g.gain.linearRampToValueAtTime(a, now+0.181);
                        g.gain.exponentialRampToValueAtTime(0.001, now+0.68);
                        o.connect(g); g.connect(master); o.start(now+0.18); o.stop(now+0.7);
                    });
                    animateViz(1.0);
                }
            },
            {
                id: 'lokma_cascade_chime',
                name: '✨ Cascade Chime',
                desc: 'Hızlı 5-nota inen parıltı — premium his',
                tag: 'PREMİUM', tagClass: 'tag-premium',
                icon: '💫',
                play() {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const now = audioCtx.currentTime;
                    const master = audioCtx.createGain();
                    master.connect(audioCtx.destination);
                    master.gain.setValueAtTime(0.4, now);
                    [[2637,0],[2349,0.08],[1976,0.16],[1760,0.24],[1568,0.32]].forEach(([freq,start]) => {
                        [1, 2].forEach((h, i) => {
                            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                            o.type='sine'; o.frequency.value=freq*h;
                            const a = [0.2, 0.03][i];
                            g.gain.setValueAtTime(0, now+start);
                            g.gain.linearRampToValueAtTime(a, now+start+0.002);
                            g.gain.exponentialRampToValueAtTime(0.001, now+start+0.5);
                            o.connect(g); g.connect(master); o.start(now+start); o.stop(now+start+0.6);
                        });
                    });
                    animateViz(1.5);
                }
            },
            {
                id: 'lokma_marimba_hit',
                name: '🪵 Marimba Hit',
                desc: 'Sıcak tahta çift vuruş — iMessage tarzı',
                tag: 'SICAK', tagClass: 'tag-fun',
                icon: '🎹',
                play() {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    const now = audioCtx.currentTime;
                    const master = audioCtx.createGain();
                    master.connect(audioCtx.destination);
                    master.gain.setValueAtTime(0.5, now);
                    // First note C5
                    [523.25, 1046.5, 1569.75].forEach((f, i) => {
                        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        o.type = 'sine'; o.frequency.value = f;
                        const a = [0.4, 0.25, 0.1][i];
                        const d = [0.3, 0.08, 0.05][i];
                        g.gain.setValueAtTime(a, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + d);
                        o.connect(g); g.connect(master); o.start(now); o.stop(now + d + 0.1);
                    });
                    // Second note E5
                    setTimeout(() => {
                        [659.25, 1318.5].forEach((f, i) => {
                            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                            o.type = 'sine'; o.frequency.value = f;
                            const a = [0.35, 0.2][i];
                            g.gain.setValueAtTime(a, audioCtx.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                            o.connect(g); g.connect(master); o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + 0.5);
                        });
                    }, 150);
                    animateViz(0.8);
                }
            }
        ];

        const list = document.getElementById('soundList');
        sounds.forEach(s => {
            const card = document.createElement('div');
            card.className = 'sound-card';
            card.innerHTML = `
                <div class="icon">${s.icon}</div>
                <div class="info">
                    <div class="name">${s.name}</div>
                    <div class="desc">${s.desc}</div>
                    <span class="tag ${s.tagClass}">${s.tag}</span>
                </div>
                <button class="play-btn" title="Dinle">▶</button>
            `;
            card.addEventListener('click', () => {
                document.querySelectorAll('.sound-card').forEach(c => c.classList.remove('playing'));
                card.classList.add('playing');
                s.play();
                const box = document.getElementById('selectedBox');
                box.style.display = 'block';
                box.innerHTML = `🔔 Seçili: <strong>${s.name}</strong> (${s.id}.caf) — Bana söyle, hemen iPhone'a yükleyeyim!`;
                setTimeout(() => card.classList.remove('playing'), 1000);
            });
            list.appendChild(card);
        });
    </script>
</body>
</html>
